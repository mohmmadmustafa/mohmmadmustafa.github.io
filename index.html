<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>اختر النسخة</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      background: white;
      padding: 50px 60px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 {
      color: #1a1a1a;
      margin-bottom: 40px;
      font-size: 2.1rem;
    }
    .btn {
      display: inline-block;
      width: 220px;
      padding: 18px 30px;
      margin: 15px;
      background-color: #0066ff;
      color: white;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .btn:hover {
      background-color: #0055dd;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
    }
    .btn.v2 {
      background-color: #00b894;
    }
    .btn.v2:hover {
      background-color: #00a376;
      box-shadow: 0 8px 20px rgba(0, 184, 148, 0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>اختر النسخة</h1>
    
    <a href="v1/index.html" class="btn">النسخة القديمة (v1)</a>
    <a href="v2/index.html" class="btn v2">النسخة الجديدة (v2)</a>
  </div>

</body>
</html>
